<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Toggle</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=TASA+Orbiter:wght@400..800&display=swap"

  <body>
